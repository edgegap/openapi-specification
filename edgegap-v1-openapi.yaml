openapi: 3.0.1
info:
  title: Edgegap v1 API
  description: >-
    <h1>Introduction</h1>

    <p>Learn more about Edgegap API through <a href="http://docs.edgegap.com"
    target="_blank">the official documentation.</a> If you have any questions or
    feature suggestions, <a href="http://discord.gg/NgCnkHbsGp"
    target="_blank">contact us on Discord</a>.</p>
  version: 2026.04.24
  termsOfService: https://app.edgegap.com/terms-and-conditions
  contact:
    name: Contact
    email: info@edgegap.com
    url: https://edgegap.com
tags:
  - name: Applications
  - name: Versioning
  - name: Container Registry
  - name: Tags
  - name: Deployments
  - name: Dedicated Servers
  - name: Integration
  - name: Relays
  - name: Endpoint Storage
paths:
  /v1/app:
    post:
      summary: Create App
      deprecated: false
      description: Create an app to group versions and/or split environments.
      operationId: application-create
      tags:
        - Applications
        - Versioning
      parameters:
        - name: Accept
          in: header
          description: ''
          example: '*/*'
          schema:
            type: string
        - name: Content-Type
          in: header
          description: ''
          example: application/json
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Custom identifier.
                  minLength: 3
                  maxLength: 64
                  example: my-game-server
                is_active:
                  type: boolean
                  description: Enable or disable deployments.
                  default: true
                  example: true
                image:
                  type: string
                  description: Image base64 string.
                  example: iVBORw0KGgoAAAANSUhEUg[...]AAABJRU5ErkJggg==
              required:
                - image
                - is_active
                - name
            examples: {}
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    description: Custom name.
                    minLength: 3
                    maxLength: 64
                    example: my-game-server
                  is_active:
                    type: boolean
                    description: Enable or disable deployments.
                    default: true
                    example: true
                  image:
                    type: string
                    description: Image base64 string.
                    example: iVBORw0KGgoAAAANSUhEUg[...]AAABJRU5ErkJggg==
                  create_time:
                    type: string
                    description: Date of creation.
                    example: '2026-04-22 12:00:46.444265'
                  last_updated:
                    type: string
                    description: Date of last update.
                    example: '2026-04-22 12:00:46.444265'
                required:
                  - name
                  - is_active
                  - image
                  - create_time
                  - last_updated
          headers: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
      security:
        - apiKey: []
  /v1/app/{app_name}:
    get:
      summary: Get App
      deprecated: false
      description: Get app details.
      operationId: application-get
      tags:
        - Applications
        - Versioning
      parameters:
        - name: app_name
          in: path
          description: ''
          required: true
          example: my-game-server
          schema:
            type: string
        - name: Accept
          in: header
          description: ''
          example: '*/*'
          schema:
            type: string
        - name: Content-Type
          in: header
          description: ''
          example: application/json
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
          headers: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
      security:
        - apiKey: []
    patch:
      summary: Update App
      deprecated: false
      description: Modify existing app.
      operationId: application-update
      tags:
        - Applications
        - Versioning
      parameters:
        - name: app_name
          in: path
          description: ''
          required: true
          example: my-game-server
          schema:
            type: string
        - name: Accept
          in: header
          description: ''
          required: false
          example: '*/*'
          schema:
            type: string
        - name: Content-Type
          in: header
          description: ''
          required: false
          example: application/json
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
