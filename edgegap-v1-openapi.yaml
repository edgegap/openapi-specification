components:
  schemas:
    PaginatedResponse:
      type: object
      properties:
        total_count:
          type: integer
          minimum: 0
          example: 100
        pagination:
          type: object
          properties:
            number:
              type: integer
              minimum: 0
              example: 1
            next_page_number:
              type: integer
              minimum: 1
              nullable: true
              example: 2
            previous_page_number:
              type: integer
              minimum: 1
              nullable: true
            paginator:
              type: object
              properties:
                num_pages:
                  type: integer
                  minimum: 1
                  example: 10
              required:
                - num_pages
            has_next:
              type: boolean
              default: true
            has_previous:
              type: boolean
              default: false
          required:
            - number
            - next_page_number
            - previous_page_number
            - paginator
            - has_next
            - has_previous
      required:
        - total_count
        - pagination
    InjectedEnvVariable:
      required:
        - key
        - value
      properties:
        key:
          type: string
          description: >-
            Custom key used to access the injected variable within the
            deployment. Automatically sanitized.
          example: MM_MATCH_PROFILE
        value:
          type: string
          description: Custom value to inject in your deployment, up to 4 KB.
          example: advanced-example
        is_hidden:
          type: boolean
          description: Enable encryption at rest to prevent reading the value with API.
          default: false
          example: false
      type: object
    V1DeployFilter:
      type: object
      properties:
        field:
          type: string
          description: Deployment field used for filtering.
          example: city
        values:
          type: array
          description: Values to compare against.
          items:
            type: string
            example: Montreal
          example:
            - Montreal
        filter_type:
          type: string
          description: Filter operator
          enum:
            - any
            - all
            - not
          example: any
      required:
        - field
        - filter_type
        - values
    DeploymentPort:
      type: object
      properties:
        name:
          type: string
          description: Custom identifier.
          example: gameport
        link:
          type: string
          description: URL to connect, containing FQDN and external port.
          example: https://c66980ae5bf1.pr.edgegap.net:30345
        internal:
          type: integer
          description: Internal listener port where deployment expects connections.
          minimum: 0
          maximum: 59999
          example: 7777
        external:
          type: integer
          minimum: 0
          maximum: 59999
          description: Randomly assigned port to connect to the deployment.
          example: 30345
        protocol:
          type: string
          description: Selected networking protocol.
          example: UDP
        tls_upgrade:
          type: boolean
          description: TLS proxy, only available with ports WS and HTTP.
          default: false
      required:
        - name
        - link
        - internal
        - external
        - protocol
        - tls_upgrade
    Error:
      required:
        - message
      properties:
        message:
          type: string
          description: A message depending of the request termination
      type: object
    V1DeploymentStatus:
      type: object
      properties:
        request_id:
          type: string
          description: ID of your deployment, also referred to as request ID.
          example: c0653765de3b
        fqdn:
          type: string
          description: FQDN (URL) to connect to the deployment.
          example: c0653765de3b.pr.edgegap.net
        public_ip:
          type: string
          description: Public IP address of the host.
          example: 192.53.120.48
        app_name:
          type: string
          description: Application which has been deployed.
          example: test
        app_version:
          type: string
          description: App version which has been deployed.
          example: v1
        current_status:
          type: string
          description: Indicates whether deployment is Ready, in Error, or otherwise.
          example: Status.SEEKING
        running:
          type: boolean
          description: True if deployment is Ready for connections.
          default: true
          example: true
        start_time:
          type: string
          description: Timestamp of deployment becoming Ready.
          format: date-time
          example: '2026-04-22 12:00:46.444265'
        elapsed_time:
          type: integer
          description: Seconds since deployment becoming Ready.
        max_duration:
          type: integer
          description: >-
            Maximum allowed uptime minutes of deployments before automatically
            stopped.
          minimum: -1
          maximum: 1440
          example: 1440
        removal_time:
          type: string
          description: Timestamp of deployment stopped.
          format: date-time
          example: '2026-04-22 12:00:46.444265'
        last_status:
          type: string
          description: Previous status of deployment.
          example: Status.SEEKING
        error:
          type: boolean
          description: Indicates an error with the deployment.
          default: false
          example: true
        error_detail:
          type: string
          description: Details of the error.
          example: Pull image timeout exceeded
        ports:
          type: object
          properties:
            gameport:
              $ref: '#/components/schemas/DeploymentPort'
          description: Port mapping exposing server listeners to internet.
        location:
          $ref: '#/components/schemas/LocationData'
          description: Geographic location of the deployment.
        tags:
          type: array
          items:
            type: string
            example: production
          description: List of tags to mark your deployments for easy filtering.
        command:
          type: string
          description: Overrides container command for the deployment, use with caution.
          example: echo "hi" && sleep infinity
        arguments:
          type: string
          description: Overrides container arguments for the deployment, use with caution.
      required:
        - app_name
        - app_version
        - current_status
        - elapsed_time
        - error
        - fqdn
        - max_duration
        - public_ip
        - request_id
        - running
        - start_time
      nullable: true
    LocationData:
      required:
        - administrative_division
        - city
        - continent
        - country
        - latitude
        - longitude
        - timezone
      properties:
        city:
          type: string
          description: City of the deployment.
          example: Montreal
        country:
          type: string
          description: Country of the deployment.
          example: Canada
        continent:
          type: string
          description: Continent of the deployment.
          example: North America
        administrative_division:
          type: string
          description: Administrative division of the deployment.
          example: Quebec
        timezone:
          type: string
          description: Timezone of the deployment.
          example: Eastern Time
        latitude:
          type: number
          description: Latitude of the deployment
          example: 45.508888
        longitude:
          type: number
          description: Longitude of the deployment.
          example: -73.561668
      type: object
    DeleteDeploymentResponse:
      required:
        - message
      properties:
        message:
          type: string
          description: Additional information regarding deployment termination.
          example: 1a9e4ff02cce - Delete request will be processed soon
      type: object
    AppVersionPayload:
      required:
        - docker_image
        - docker_repository
        - docker_tag
        - name
        - req_cpu
        - req_memory
      properties:
        name:
          type: string
          description: Custom version identifier, often a timestamp or a build ID.
          minLength: 1
          maxLength: 64
          example: 2024.01.30-16.23.00-UTC
        create_time:
          type: string
          description: Date of creation.
          format: date-time
          example: '2026-04-22 20:30:52.283949'
        last_updated:
          type: string
          description: Date of last update.
          format: date-time
          example: '2026-04-22 20:30:52.283949'
        is_active:
          type: boolean
          description: Enable or disable deployments.
          default: true
          example: true
        req_cpu:
          type: integer
          description: Amount of vCPU units assigned to deployments. (1024 units = 1 vCPU).
          minimum: 100
          example: 1536
        req_memory:
          type: integer
          description: >-
            Amount of memory MB assigned to deployments, at most double your
            vCPU units. (1024 MB = 1 GB).
          minimum: 100
          example: 3072
        req_video:
          type: integer
          description: Amount of GPU units assigned to deployments. (1024 = 1 GPU)
          minimum: 0
          example: 0
        docker_repository:
          type: string
          description: Docker registry URL, ‘docker_repository’ is named incorrectly.
          example: registry.edgegap.com
        private_username:
          type: string
          description: Docker Registry username. Not your Edgegap credentials.
          example: robot$my-org-cv2l3w3vy6fg+app-version-pull
        private_token:
          type: string
          description: Docker Registry token/password. Not your Edgegap credentials.
          example: ghca3dz3foAxXf2tu2xjExtXrBOMydfC
        docker_image:
          type: string
          description: Namespaced docker image ID.
          example: my-org-cv2l3w3vy6fg/my-game-server
        docker_tag:
          type: string
          description: >-
            Docker tag ID, typically timestamp or a build ID. Avoid using
            `latest` or overwriting tags.
          example: 2024.01.30-16.23.00-UTC
        verify_image:
          type: boolean
          description: >-
            Enable to verify we can pull your docker image using provided
            parameters and credentials.
          default: false
          example: true
        force_cache:
          type: boolean
          description: >-
            Enable faster deployments with global image preloading. Recommended
            for live games.
          example: true
        caching_percent:
          type: number
          description: >-
            Current global caching percentage on scale 0-1. Values above 0.8
            (80%) are considered a good coverage level.
          example: 0.8
        time_to_deploy:
          type: integer
          description: >-
            Image downloads exceeding this period (seconds) will timeout and be
            marked as Error.
          minimum: 15
          default: 10
          example: 10
        max_duration:
          type: integer
          description: >-
            Maximum allowed uptime minutes of deployments before automatically
            stopped.
          default: 1440
          minimum: -1
          maximum: 1440
          example: 1440
        termination_grace_period_seconds:
          type: integer
          description: >-
            Termination grace period in seconds after sending the SIGTERM signal
            to your deployment. Allows graceful shutdown and post-processing
            before the container stops.
          minimum: 5
          maximum: 3600
          example: 5
        will_deploy_in_mainland_china:
          type: boolean
          description: Enable China Gateway. Disable to deploy worldwide except China.
          default: false
        dns_config:
          type: string
          description: DNS configuration identifier for custom deployment domains.
          example: my-dns-config
        ports:
          type: array
          items:
            $ref: '#/components/schemas/AppVersionPort'
          description: Port mapping exposing server listeners to internet.
        envs:
          type: array
          description: Inject variables to pass parameters to your game server.
          items:
            $ref: '#/components/schemas/InjectedEnvVariable'
        endpoint_storage:
          type: string
          description: >-
            Endpoint storage identifier to upload deployment logs, overrides app
            version storage if specified.
          example: my-storage
      type: object
    AppVersionPort:
      required:
        - port
        - protocol
      properties:
        port:
          type: integer
          description: Internal listener port where deployment expects connections.
          minimum: 0
          maximum: 59999
          example: 7777
        protocol:
          type: string
          description: Selected networking protocol.
          example: UDP
        to_check:
          type: boolean
          description: Enable or disable deployment port readiness check.
          default: true
          example: true
        tls_upgrade:
          type: boolean
          description: Enable or disable TLS proxy, only available with ports WS and HTTP.
          default: false
          example: false
        name:
          type: string
          description: Custom port identifier.
          example: gameport
      type: object
    Application:
      required:
        - create_time
        - is_active
        - last_updated
        - name
        - image
      properties:
        name:
          type: string
          description: Custom name.
          minLength: 3
          maxLength: 64
          example: my-game-server
        is_active:
          type: boolean
          description: Enable or disable deployments.
          default: true
          example: true
        image:
          type: string
          description: Image base64 string.
          example: iVBORw0KGgoAAAANSUhEUg[...]AAABJRU5ErkJggg==
        create_time:
          type: string
          description: Date of creation.
          example: '2026-04-22 12:00:46.444265'
        last_updated:
          type: string
          description: Date of last update.
          example: '2026-04-22 12:00:46.444265'
      type: object
    MetricsModel:
      properties:
        labels:
          type: array
          items:
            type: string
            example: '00:00:00'
        datasets:
          type: array
          items:
            type: integer
        timestamps:
          type: array
          items:
            type: string
            format: date
            example: '2021-07-14 14:17:37.711'
      type: object
    EndpointStorage:
      required:
        - access_key_id
        - bucket
        - endpoint
        - name
      properties:
        name:
          type: string
          description: Name of the Endpoint Storage
          example: my-s3-endpoint
        access_key_id:
          type: string
          description: Your access key ID to connect to your S3 Bucket.
          example: my-access-key-id
        endpoint:
          type: string
          description: >-
            Full URL to your S3 Bucket with https or http. It's recommended to
            not include your bucket name as a subdomain
          example: https://us-east-1.your-s3-provider.com
        bucket:
          type: string
          description: >-
            Your secret access key to connect to your S3 Bucket. Will be
            encrypted.
          example: my-bucket
        output_format:
          type: string
          description: The format how the logs will be exported to the bucket.
          default: TEXT
          enum:
            - TEXT
            - NDJSON
          example: NDJSON
        create_time:
          type: string
          description: UTC time of endpoint storage creation
          example: '2022-01-01 00:00:00.000000'
        last_updated:
          type: string
          description: UTC time of endpoint storage last update
          example: '2022-01-01 00:00:00.000000'
      type: object
    PullProfile:
      required:
        - destination
        - name
        - source
        - source_type
      properties:
        name:
          type: string
          description: Name of the pull profile
          example: pull_profile_name
        source:
          type: string
          description: Source in the S3 bucket to fetch from
          example: /my-bucket/config.cfg
        source_type:
          type: string
          description: If the source is a File or a Directory
          enum:
            - File
            - Folder
          example: File
        destination:
          type: string
          description: >-
            Destination path where your source will be uploaded in your
            container. Make sure to avoid protected destinations, such as
            `/etc/`, as this will prevent the files from being copied to your
            deployment, and will make your deployment fail. Make sure a normal
            user can write to the destination folder.
          example: /usr/share/configs
        create_time:
          type: string
          description: UTC time of pull profile creation
          example: '2022-01-01 00:00:00.000000'
        last_updated:
          type: string
          description: UTC time of pull profile last update
          example: '2022-01-01 00:00:00.000000'
      type: object
    RelaySession:
      required:
        - linked
        - ready
        - session_id
        - status
      properties:
        session_id:
          type: string
          description: The session ID
          example: 7349356945f1-S
        authorization_token:
          type: integer
          description: The authorization token for the session
          example: 3500589645
        status:
          type: string
          description: The status of the session
          example: READY
        ready:
          type: boolean
          description: If the session is ready to be used
        linked:
          type: boolean
          description: If the session is linked to a relay
        error:
          type: string
          description: The error message if the session failed
          example: Session failed
        session_users:
          type: array
          description: List Session Users
          items:
            type: object
            properties:
              ip_address:
                type: string
                description: The IP Address of the user
                example: 1.1.1.1
              latitude:
                type: number
                description: The latitude of the user
                example: 45.5088
              longitude:
                type: number
                description: The longitude of the user
                example: -73.5878
              authorization_token:
                type: integer
                description: The authorization token of the user
                example: 21986334
        relay:
          description: The relay details the session is linked to
          allOf:
            - type: object
              properties:
                ip:
                  type: string
                  description: The IP Address of the relay
                  example: 2.2.2.2
                host:
                  type: string
                  description: The host of the relay
                  example: 7349356945f1.st.edgegap.net
                ports:
                  type: object
                  properties:
                    server:
                      type: object
                      properties:
                        port:
                          type: integer
                          description: The port number
                          example: 32000
                        protocol:
                          type: string
                          description: The protocol of the port
                          example: UDP
                        link:
                          type: string
                          description: The link to the port
                          example: 7349356945f1.st.edgegap.net:32000
                    client:
                      type: object
                      properties:
                        port:
                          type: integer
                          description: The port number
                          example: 32001
                        protocol:
                          type: string
                          description: The protocol of the port
                          example: UDP
                        link:
                          type: string
                          description: The link to the port
                          example: 7349356945f1.st.edgegap.net:32001
        webhook_url:
          type: string
          description: The webhook URL that we will call once the session is ready
          example: https://my-webhook.com/dump
      type: object
    DeploymentTag:
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the tag.
          maxLength: 40
          minLength: 1
          example: development
      type: object
    DeploymentTagResponse:
      properties:
        name:
          type: string
          description: Name of the tag.
          maxLength: 40
          minLength: 1
          example: development
        create_time:
          type: string
          description: Date of creation.
          format: date-time
          example: '2026-04-22 20:30:52.283949'
        last_updated:
          type: string
          description: Date of last update.
          format: date-time
          example: '2026-04-22 20:30:52.283949'
      type: object
      required:
        - name
  responses: {}
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        [Manage API tokens in
        dashboard.](https://app.edgegap.com/user-settings?tab=tokens)
servers:
  - url: https://api.edgegap.com
    description: https://api.edgegap.com
security:
  - apiKey: []
