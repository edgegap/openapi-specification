  /v1/apps:
    get:
      summary: List Apps
      deprecated: false
      description: List apps under your organization.
      operationId: application-list
      tags:
        - Applications
        - Versioning
      parameters:
        - name: page
          in: query
          description: ''
          example: 0
          schema:
            type: integer
            minimum: 1
            example: 2
        - name: limit
          in: query
          description: ''
          example: 0
          schema:
            type: integer
            minimum: 1
            example: 20
        - name: Accept
          in: header
          description: ''
          example: '*/*'
          schema:
            type: string
        - name: Content-Type
          in: header
          description: ''
          example: application/json
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  applications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Application'
                  total_count:
                    type: integer
                    minimum: 0
                    example: 100
                  pagination:
                    type: object
                    properties:
                      number:
                        type: integer
                        minimum: 0
                        example: 1
                      next_page_number:
                        type: integer
                        minimum: 1
                        nullable: true
                        example: 2
                      previous_page_number:
                        type: integer
                        minimum: 1
                        nullable: true
                      paginator:
                        type: object
                        properties:
                          num_pages:
                            type: integer
                            minimum: 1
                            example: 10
                        required:
                          - num_pages
                      has_next:
                        type: boolean
                        default: true
                      has_previous:
                        type: boolean
                        default: false
                    required:
                      - number
                      - next_page_number
                      - previous_page_number
                      - paginator
                      - has_next
                      - has_previous
                required:
                  - total_count
                  - pagination
          headers: {}
        '400':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '403':
          description: ''
          content:
            application/json:
              schema:
                title: ''
                type: object
                properties:
                  message:
                    type: string
                    description: A message depending of the request termination
                required:
                  - message
          headers: {}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
      security:
        - apiKey: []
  /v1/app/{app_name}/version:
    post:
      summary: Create App Version
      deprecated: false
      description: Create an app version.
      operationId: app-version-create
      tags:
        - Applications
        - Versioning
      parameters:
        - name: app_name
          in: path
          description: ''
          required: true
          example: my-game-server
          schema:
            type: string
            minLength: 3
            maxLength: 64
            example: my-game-server
        - name: Accept
          in: header
          description: ''
          example: '*/*'
          schema:
            type: string
        - name: Content-Type
          in: header
          description: ''
          example: application/json
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Custom version identifier, often a timestamp or a build ID.
                  minLength: 1
                  maxLength: 64
                  example: 2024.01.30-16.23.00-UTC
                is_active:
                  type: boolean
                  description: Enable or disable deployments.
                  default: true
                  example: true
                req_cpu:
                  type: integer
                  description: >-
                    Amount of vCPU units assigned to deployments. (1024 units =
                    1 vCPU).
                  minimum: 100
                  example: 1536
                req_memory:
                  type: integer
                  description: >-
                    Amount of memory MB assigned to deployments, at most double
                    your vCPU units. (1024 MB = 1 GB).
                  minimum: 100
                  example: 3072
                req_video:
                  type: integer
                  description: Amount of GPU units assigned to deployments. (1024 = 1 GPU)
                  minimum: 0
                  example: 0
                docker_repository:
                  type: string
                  description: >-
                    Docker registry URL, ‘docker_repository’ is named
                    incorrectly.
                  example: registry.edgegap.com
                private_username:
                  type: string
                  description: Docker Registry username. Not your Edgegap credentials.
                  example: robot$my-org-cv2l3w3vy6fg+app-version-pull
                private_token:
                  type: string
                  description: >-
                    Docker Registry token/password. Not your Edgegap
                    credentials.
                  example: ghca3dz3foAxXf2tu2xjExtXrBOMydfC
                docker_image:
                  type: string
                  description: Namespaced docker image ID.
                  example: my-org-cv2l3w3vy6fg/my-game-server
                docker_tag:
                  type: string
                  description: >-
                    Docker tag ID, typically timestamp or a build ID. Avoid
                    using `latest` or overwriting tags.
                  example: 2024.01.30-16.23.00-UTC
                verify_image:
                  type: boolean
                  description: >-
                    Enable to verify we can pull your docker image using
                    provided parameters and credentials.
                  default: false
                  example: true
                force_cache:
                  type: boolean
                  description: >-
                    Enable faster deployments with global image preloading.
                    Recommended for live games.
                  example: true
                time_to_deploy:
                  type: integer
                  description: >-
                    Image downloads exceeding this period (seconds) will timeout
                    and be marked as Error.
                  minimum: 15
                  default: 10
                  example: 10
                max_duration:
                  type: integer
                  description: >-
                    Maximum allowed uptime minutes of deployments before
                    automatically stopped.
                  default: 1440
                  minimum: -1
                  maximum: 1440
                  example: 1440
                termination_grace_period_seconds:
                  type: integer
                  description: >-
                    Termination grace period in seconds after sending the
                    SIGTERM signal to your deployment. Allows graceful shutdown
                    and post-processing before the container stops.
                  minimum: 5
                  maximum: 3600
                  example: 5
                will_deploy_in_mainland_china:
                  type: boolean
                  description: >-
                    Enable China Gateway. Disable to deploy worldwide except
                    China.
                  default: false
                dns_config:
                  type: string
                  description: DNS configuration identifier for custom deployment domains.
                  example: my-dns-config
                ports:
                  type: array
                  items:
                    $ref: '#/components/schemas/AppVersionPort'
                  description: Port mapping exposing server listeners to internet.
                envs:
                  type: array
                  description: Inject variables to pass parameters to your game server.
                  items:
                    $ref: '#/components/schemas/InjectedEnvVariable'
                endpoint_storage:
                  type: string
                  description: >-
                    Endpoint storage identifier to upload deployment logs,
                    overrides app version storage if specified.
                  example: my-storage
              required:
                - docker_image
                - docker_repository
                - docker_tag
                - name
                - req_cpu
                - req_memory
            example:
              name: 2024.01.30-16.23.00-UTC
              req_cpu: 1536
              req_memory: 3072
              docker_repository: registry.edgegap.com
              private_username: robot$my-org-cv2l3w3vy6fg+app-version-pull
              private_token: ghca3dz3foAxXf2tu2xjExtXrBOMydfC
              docker_image: my-org-cv2l3w3vy6fg/my-game-server
              docker_tag: 2024.01.30-16.23.00-UTC
              ports:
                - port: 7777
                  protocol: UDP
                  to_check: false
                  name: gameport
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: If the creation happened correctly
                    default: true
                  version:
                    $ref: '#/components/schemas/AppVersionPayload'
                required:
                  - success
                  - version
              example:
                success: true
                version:
                  name: 2024.01.30-16.23.00-UTC
                  create_time: '2026-04-22 20:30:52.283949'
                  last_updated: '2026-04-22 20:30:52.283949'
                  is_active: true
                  req_cpu: 1536
                  req_memory: 3072
                  docker_repository: docker.io
                  private_username: robot$my-org-cv2l3w3vy6fg+app-version-pull
                  private_token: ghca3dz3foAxXf2tu2xjExtXrBOMydfC
                  docker_image: my-org-cv2l3w3vy6fg/my-game-server
                  docker_tag: 2024.01.30-16.23.00-UTC
                  verify_image: false
                  force_cache: false
                  caching_percent: 0.8
                  time_to_deploy: 30
                  max_duration: 60
                  termination_grace_period_seconds: 5
                  ports:
                    - port: 7777
                      protocol: UDP
                      to_check: false
                      tls_upgrade: false
                      name: gameport
                  envs: []
          headers: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '424':
          description: Failed Dependency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
      security:
        - apiKey: []
