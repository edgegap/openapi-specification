                  description: Application name
                  minLength: 3
                  maxLength: 64
                  example: my-game-server
                is_active:
                  type: boolean
                  description: If the application can be deployed
                  default: true
                  example: true
                image:
                  type: string
                  description: Image base64 string
                  example: iVBORw0KGgoAAAANSUhEUg[...]AAABJRU5ErkJggg==
            examples: {}
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
          headers: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
      security:
        - apiKey: []
    delete:
      summary: Delete App
      deprecated: false
      description: Delete an app and its versions.
      operationId: application-delete
      tags:
        - Applications
        - Versioning
      parameters:
        - name: app_name
          in: path
          description: ''
          required: true
          example: my-game-server
          schema:
            type: string
        - name: Accept
          in: header
          description: ''
          example: '*/*'
          schema:
            type: string
        - name: Content-Type
          in: header
          description: ''
          example: application/json
          schema:
            type: string
      responses:
        '200':
          description: Success
          headers: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers: {}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
